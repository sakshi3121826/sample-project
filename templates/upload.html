{% extends 'base.html' %}
{% block content %}
  <section class="page-intro-grid">
    <div class="page-intro-card">
      <h1>Upload dashboard</h1>
      <p>Select the input form you want to use, then send it for extraction.</p>
    </div>
    <div class="page-intro-image">
      <img src="{{ url_for('static', filename='images/hero-visual.svg') }}" alt="Upload illustration" />
    </div>
  </section>
  <section>
    <div class="tab-menu">
      <button class="tab-button active" data-tab="video-tab">Video</button>
      <button class="tab-button" data-tab="text-tab">Text</button>
      <button class="tab-button" data-tab="xlsx-tab">Excel</button>
    </div>

    <div id="video-tab" class="tab-panel active">
      <h2>Upload video</h2>
      <form action="{{ url_for('api_process_video') }}" method="post" enctype="multipart/form-data">
        <label>Video file</label>
        <input type="file" name="file" accept="video/*" required />
        <button class="button" type="submit">Process video</button>
      </form>
    </div>

    <div id="text-tab" class="tab-panel">
      <h2>Paste transaction text</h2>
      <form action="{{ url_for('api_process_text') }}" method="post">
        <label>Text input</label>
        <textarea name="text" rows="10" placeholder="Paste text from receipts, statements, or invoices"></textarea>
        <button class="button" type="submit">Process text</button>
      </form>
    </div>

    <div id="xlsx-tab" class="tab-panel">
      <h2>Upload Excel file</h2>
      <form action="{{ url_for('api_process_xlsx') }}" method="post" enctype="multipart/form-data">
        <label>Excel file</label>
        <input type="file" name="file" accept=".xlsx,.xls" required />
        <button class="button" type="submit">Process spreadsheet</button>
      </form>
    </div>
  </section>
{% endblock %}
