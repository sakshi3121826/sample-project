<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multi-Format Extraction Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="{{ url_for('index') }}">Unified Extractor</a>
    </div>
    <nav class="main-nav">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('upload') }}">Upload</a>
      <a href="{{ url_for('video') }}">Video</a>
      <a href="{{ url_for('text') }}">Text</a>
      <a href="{{ url_for('xlsx') }}">Excel</a>
      <a href="{{ url_for('transactions') }}">Transactions</a>
      <a href="{{ url_for('images') }}">Images</a>
      <a href="{{ url_for('results') }}">Results</a>
      <a href="{{ url_for('settings') }}">Settings</a>
      <a href="{{ url_for('about') }}">About</a>
    </nav>
    <div class="user-nav">
      {% if current_user %}
        <span class="user-badge">Hi, {{ current_user }}</span>
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('signup') }}">Signup</a>
      {% endif %}
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>Built with Flask, HTML, CSS, JS and designed for Azure video + document extraction.</p>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
